<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线索内容一体化 AIGC Claw — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0f2f8;
  --panel: #ffffff;
  --red: #e01a3a;
  --red-light: rgba(224,26,58,0.08);
  --red-mid: rgba(224,26,58,0.15);
  --green: #12b76a;
  --green-light: rgba(18,183,106,0.12);
  --blue: #2563eb;
  --blue-light: rgba(37,99,235,0.10);
  --purple: #7c3aed;
  --purple-light: rgba(124,58,237,0.10);
  --orange: #ea580c;
  --orange-light: rgba(234,88,12,0.10);
  --text: #1a1a2e;
  --text2: #555577;
  --text3: #8888aa;
  --border: #e2e4ef;
  --shadow: 0 2px 12px rgba(0,0,50,0.08);
  --font: 'Fira Code', 'SF Mono', monospace;
  --radius: 10px;
}

html, body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  min-height: 100vh;
  font-size: 13px;
  line-height: 1.6;
}

/* ============================================================
   TOP PROGRESS BAR
   ============================================================ */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: var(--red);
  width: 0%;
  transition: width 0.4s ease;
  z-index: 9999;
  box-shadow: 0 0 8px rgba(224,26,58,0.5);
}

/* ============================================================
   COMPLETION BANNER
   ============================================================ */
#completion-banner {
  position: fixed;
  top: -60px; left: 0; right: 0;
  height: 48px;
  background: linear-gradient(90deg, #12b76a, #059669);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  z-index: 9998;
  transition: top 0.5s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing: 0.5px;
}
#completion-banner.show { top: 0; }

/* ============================================================
   WINDOW CHROME
   ============================================================ */
.app-window {
  max-width: 1280px;
  margin: 24px auto;
  border-radius: 14px;
  box-shadow: 0 8px 40px rgba(0,0,50,0.15);
  overflow: hidden;
  background: var(--panel);
  display: flex;
  flex-direction: column;
  height: calc(100vh - 48px);
}

.title-bar {
  background: #eaecf3;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 10px 16px;
  gap: 8px;
  flex-shrink: 0;
}
.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dot.red    { background: #ff5f57; }
.dot.yellow { background: #ffbd2e; }
.dot.green  { background: #28c840; }

.title-center {
  flex: 1;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.3px;
}

.title-right {
  display: flex;
  gap: 6px;
  align-items: center;
}

.ctrl-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel);
  font-family: var(--font);
  font-size: 11px;
  cursor: pointer;
  color: var(--text);
  transition: all 0.2s;
  white-space: nowrap;
}
.ctrl-btn:hover { background: var(--bg); }
.ctrl-btn.primary {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}
.ctrl-btn.primary:hover { background: #c01530; }
.ctrl-btn.success {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}

/* ============================================================
   TAB NAV
   ============================================================ */
.tab-nav {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
.tab {
  padding: 10px 20px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { color: var(--text2); }
.tab.active {
  color: var(--red);
  border-bottom-color: var(--red);
  background: var(--panel);
}
.tab.flash-highlight {
  animation: tabFlash 0.5s ease 3;
}
@keyframes tabFlash {
  0%, 100% { background: transparent; color: var(--text3); }
  50% { background: var(--red-light); color: var(--red); }
}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ---- LEFT SIDEBAR ---- */
.sidebar {
  width: 220px;
  border-right: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-section {
  padding: 12px 14px 6px;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.merchant-card {
  margin: 4px 10px;
  padding: 10px 12px;
  border-radius: var(--radius);
  background: var(--panel);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.merchant-card.active {
  border-color: var(--red);
  background: var(--red-light);
}
.merchant-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
}
.merchant-meta {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}
.task-item {
  margin: 2px 10px;
  padding: 7px 12px;
  border-radius: 7px;
  font-size: 11px;
  color: var(--text2);
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.task-item:hover { background: var(--panel); }
.task-badge {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  background: var(--green-light);
  color: var(--green);
  white-space: nowrap;
}
.task-badge.in-progress {
  background: var(--red-light);
  color: var(--red);
}

/* ---- CHAT AREA ---- */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* scrollbar */
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.chat-input-bar {
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--font);
  font-size: 12px;
  color: var(--text);
  outline: none;
}
.chat-input:focus { border-color: var(--red); }
.send-btn {
  padding: 8px 16px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
}

/* ---- RIGHT PANEL ---- */
.right-panel {
  width: 300px;
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.right-panel::-webkit-scrollbar { width: 4px; }
.right-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.panel-section {
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.panel-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* ============================================================
   CHAT BUBBLES
   ============================================================ */
.bubble-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.bubble-row.show {
  opacity: 1;
  transform: translateX(0);
}
.bubble-row.user {
  flex-direction: row-reverse;
  transform: translateX(20px);
}
.bubble-row.user.show {
  transform: translateX(0);
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  background: var(--red-light);
  border: 1px solid var(--red-mid);
}
.avatar.user-avatar {
  background: var(--blue-light);
  border-color: rgba(37,99,235,0.2);
}

.bubble {
  max-width: 520px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  border-top-left-radius: 4px;
  padding: 12px 16px;
  box-shadow: var(--shadow);
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
  position: relative;
}
.bubble-row.user .bubble {
  background: #fff5f7;
  border-color: var(--red-mid);
  border-radius: 12px;
  border-top-right-radius: 4px;
}

/* typing cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 14px;
  background: var(--red);
  vertical-align: middle;
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor.hide { display: none; }

/* agent prefix */
.agent-prefix {
  color: var(--red);
  font-size: 10px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

/* ============================================================
   LOADING DOTS
   ============================================================ */
.loading-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 4px 0;
}
.loading-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--text3);
  animation: dotBounce 1.2s ease infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce {
  0%,80%,100% { transform: translateY(0); opacity:0.4; }
  40% { transform: translateY(-6px); opacity:1; }
}

/* ============================================================
   RECOGNITION CARD
   ============================================================ */
.recog-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 12px 14px;
  margin-top: 10px;
  border: 1px solid var(--border);
}
.recog-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.2s ease, transform 0.2s ease;
  font-size: 12px;
}
.recog-row.show {
  opacity: 1;
  transform: translateY(0);
}
.check-icon {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  opacity: 0;
  transform: scale(0);
  transition: opacity 0.2s, transform 0.2s;
}
.check-icon.show { opacity: 1; transform: scale(1); }
.recog-label { color: var(--text3); min-width: 48px; font-size: 11px; }
.recog-val { font-weight: 600; color: var(--text); }

/* ============================================================
   DIAGNOSIS CARD
   ============================================================ */
.diag-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 12px 14px;
  margin-top: 10px;
  border: 1px solid var(--border);
}
.diag-row {
  padding: 5px 0;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.2s, transform 0.2s;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.diag-row:last-child { border-bottom: none; }
.diag-row.show { opacity: 1; transform: translateY(0); }
.diag-key { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
.diag-val { font-weight: 600; }
.diag-highlight {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  background: var(--red-light);
  border-left: 3px solid var(--red);
  font-size: 11px;
  color: var(--red);
  opacity: 0;
  position: relative;
  overflow: hidden;
  transition: opacity 0.4s;
}
.diag-highlight.show { opacity: 1; }
.diag-highlight::before {
  content: '';
  position: absolute;
  top: 0; left: -100%; width: 100%; height: 100%;
  background: rgba(224,26,58,0.08);
  animation: highlightSweep 0.8s ease forwards;
}
@keyframes highlightSweep {
  to { left: 100%; }
}

/* ============================================================
   CONTENT MATRIX TABLE
   ============================================================ */
.matrix-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  font-size: 11px;
}
.matrix-table th {
  background: var(--bg);
  padding: 8px 10px;
  text-align: left;
  color: var(--text2);
  font-weight: 600;
  border: 1px solid var(--border);
  font-size: 10px;
  letter-spacing: 0.3px;
}
.matrix-table td {
  padding: 8px 10px;
  border: 1px solid var(--border);
  vertical-align: top;
}
.matrix-row {
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.matrix-row.show {
  opacity: 1;
  transform: translateY(0);
}
.layer-tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.layer-tag.top { background: var(--blue-light); color: var(--blue); }
.layer-tag.mid { background: var(--purple-light); color: var(--purple); }
.layer-tag.bot { background: var(--red-light); color: var(--red); }
.direction-tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 10px;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
}

/* ============================================================
   PLACEMENT TABLE
   ============================================================ */
.placement-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  font-size: 11px;
}
.placement-table th {
  background: var(--bg);
  padding: 7px 9px;
  text-align: left;
  color: var(--text2);
  font-weight: 600;
  border: 1px solid var(--border);
  font-size: 10px;
}
.placement-table td {
  padding: 8px 9px;
  border: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.5;
}
.placement-row {
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.25s, transform 0.25s;
}
.placement-row.show { opacity: 1; transform: translateY(0); }
.period-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
}
.period-badge.seed { background: var(--green-light); color: var(--green); }
.period-badge.harvest { background: var(--purple-light); color: var(--purple); }
.period-badge.sprint { background: var(--red-light); color: var(--red); }

/* ============================================================
   SCRIPT CARDS
   ============================================================ */
.script-cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 12px;
}
.script-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}
.script-card.show { opacity: 1; transform: translateY(0); }
.script-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.script-source {
  font-size: 10px;
  color: var(--text3);
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px 8px;
}
.copy-btn {
  font-size: 10px;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--panel);
  cursor: pointer;
  font-family: var(--font);
  color: var(--text2);
  transition: all 0.2s;
}
.copy-btn:hover { border-color: var(--green); color: var(--green); }
.copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }
.script-text {
  font-size: 12px;
  line-height: 1.7;
  color: var(--text);
}

/* ============================================================
   VOICE BUBBLE
   ============================================================ */
.voice-bubble {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 4px 0;
}
.voice-waves {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 24px;
}
.wave-bar {
  width: 4px;
  background: var(--red);
  border-radius: 2px;
  animation: waveAnim 0.8s ease infinite;
}
.wave-bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
.wave-bar:nth-child(2) { animation-delay: 0.1s;  height: 16px; }
.wave-bar:nth-child(3) { animation-delay: 0.2s;  height: 22px; }
.wave-bar:nth-child(4) { animation-delay: 0.15s; height: 14px; }
.wave-bar:nth-child(5) { animation-delay: 0.05s; height: 10px; }
@keyframes waveAnim {
  0%,100% { transform: scaleY(0.5); opacity: 0.6; }
  50%     { transform: scaleY(1.2); opacity: 1; }
}
.voice-timer {
  font-size: 12px;
  color: var(--red);
  font-weight: 600;
  min-width: 32px;
}

/* ============================================================
   GEN PROGRESS BLOCK
   ============================================================ */
.gen-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 12px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}
.gen-block.show { opacity: 1; transform: translateY(0); }
.gen-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 10px;
}
.gen-step {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 11px;
  color: var(--text);
}
.gen-icon {
  font-size: 13px;
  min-width: 16px;
  text-align: center;
}
.gen-icon.spinning {
  animation: spin 1s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
.gen-step.done { color: var(--text3); text-decoration: line-through; }
.gen-step.active { color: var(--text); font-weight: 600; }
.gen-step.pending { color: var(--text3); }

/* ============================================================
   MATERIAL GRID
   ============================================================ */
.material-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}
.material-thumb {
  height: 70px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity 0.3s, transform 0.3s;
}
.material-thumb.show { opacity: 1; transform: scale(1); }
.material-thumb.generating {
  animation: thumbPulse 1.2s ease infinite;
}
@keyframes thumbPulse {
  0%,100% { border-color: var(--border); background: var(--bg); }
  50% { border-color: var(--red); background: var(--red-light); }
}

/* ============================================================
   CTA SECTION
   ============================================================ */
.cta-section {
  padding: 12px 16px;
  background: var(--green-light);
  border-radius: 10px;
  margin-top: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.4s, transform 0.4s;
}
.cta-section.show { opacity: 1; transform: translateY(0); }
.cta-label { font-size: 13px; font-weight: 700; color: var(--green); }
.cta-btn {
  padding: 8px 18px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
  transition: transform 0.1s;
}
.cta-btn:active { transform: scale(0.97); }

/* ============================================================
   SKILLS LIST (RIGHT PANEL)
   ============================================================ */
.skill-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  opacity: 0;
  transform: translateX(20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.skill-item:last-child { border-bottom: none; }
.skill-item.show { opacity: 1; transform: translateX(0); }
.skill-status {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
  transition: all 0.3s;
  color: var(--text3);
}
.skill-status.running {
  border-color: var(--red);
  color: var(--red);
  animation: spin 1s linear infinite;
}

function sleep(ms) {
  return new Promise(resolve => {
    if (phaseResolvers) phaseResolvers.push(resolve);
    const checkPause = () => {
      if (demoPaused) {
        setTimeout(checkPause, 100);
      } else {
        setTimeout(() => resolve(), ms);
      }
    };
    setTimeout(checkPause, 0);
  });
}

function scrollChat() {
  const c = document.getElementById('chat-messages');
  c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });

  const row = document.createElement('div');

  av.className = 'avatar' + (isUser ? ' user-avatar' : '');
  av.textContent = isUser ? '🌸' : '🦞';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  row.appendChild(av);
  row.appendChild(bubble);
  document.getElementById('chat-messages').appendChild(row);
  // trigger entrance
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('show')));
  scrollChat();
  return { row, bubble };
}

async function agentBubble(lines) {
  const { row, bubble } = createBubbleRow(false);
  const pre = document.createElement('div');
  pre.className = 'agent-prefix';
  pre.textContent = 'AIGC Claw ›';
  bubble.appendChild(pre);

  const span = document.createElement('span');
  bubble.appendChild(span);
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bubble.appendChild(cursor);

  const text = Array.isArray(lines) ? lines.join('\n') : lines;
  for (let i = 0; i < text.length; i++) {
    span.textContent += text[i];
    scrollChat();
    await sleep(22);
  }
  await sleep(500);
  cursor.classList.add('hide');
  return bubble;
}

async function userBubble(text) {
  const { row, bubble } = createBubbleRow(true);

    { period: '冲刺期', cls: 'sprint', content: '活动/利益类', action: '表单/下单', crowd: '已进线未留资+高意向访客', rhythm: '前3天冲量，出价上浮20%，预算20%' },

/* Phase 6: Scripts */
async function phase6() {
  setProgress(87);
  setSkillRunning(3);

  const { row: lRow } = await loadingBubble('生成差异化话术...');
  await sleep(1600);
  lRow.remove();

  const { row, bubble } = createBubbleRow(false);
  const pre = document.createElement('div');
  pre.className = 'agent-prefix';
  pre.textContent = 'AIGC Claw ›';
  bubble.appendChild(pre);
  const intro = document.createElement('div');
  intro.style.cssText = 'font-size:12px;margin-bottom:10px';
  intro.textContent = '💬 根据内容来源，为你生成2套差异化私信话术：';
  bubble.appendChild(intro);

  const scripts = [
    {
      source: '来自 种草/情感内容',
      text: '你好～看到你在看我们的母亲节花束，有特别想了解的款式吗？说说你妈妈喜欢什么风格，我帮你挑 🌸',
      id: 'script-a',
    },
    {
      source: '来自 对比/促转化内容',
      text: '你好～预算大概在哪个区间？我们有300-500的清新款和600-800的高端定制款，直接告诉我，我给你发实拍图',
      id: 'script-b',
    },
  ];

  const cardsDiv = document.createElement('div');
  cardsDiv.className = 'script-cards';
  bubble.appendChild(cardsDiv);
  scrollChat();

  for (const s of scripts) {
    await sleep(500);
    const card = document.createElement('div');
    card.className = 'script-card';
    card.innerHTML = `
      <div class="script-header">
        <span class="script-source">${s.source}</span>
        <button class="copy-btn" onclick="copyScript('${s.id}', this)">📋 复制</button>
      </div>
      <div class="script-text" id="${s.id}">${s.text}</div>
    `;
    cardsDiv.appendChild(card);
    requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add('show')));
    scrollChat();
  }

  setSkillDone(3);
  setProgress(91);
}

function copyScript(id, btn) {
  const text = document.getElementById(id)?.textContent || '';
  navigator.clipboard.writeText(text).catch(() => {});
  btn.textContent = '✅ 已复制';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '📋 复制';
    btn.classList.remove('copied');
  }, 2000);
}

/* Phase 8: Complete */
async function phase8() {
  setProgress(100);
  setAllSkillsDone();

  // completion banner
  document.getElementById('completion-banner').classList.add('show');

  await agentBubble('🎉 三段联动方案已生成完毕！\n内容矩阵 8条 + 投放策略 3阶段 + 私信话术 2套，随时可用。');

  // update start button

  document.getElementById('btn-start').className = 'ctrl-btn success';

  document.getElementById('btn-skip').style.display = 'none';

  demoRunning = false;
}

/* ============================================================
   DEMO ORCHESTRATION
   ============================================================ */
async function startDemo() {
  if (demoRunning) return;
  demoRunning = true;
  demoPaused = false;

  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-pause').style.display = '';
  document.getElementById('btn-skip').style.display = '';

  buildSkillsList();

  const phases = [phase0, phase1, phase2, phase3, phase4, phase5, phase6, phase7, phase8];

  for (let i = 0; i < phases.length; i++) {
    currentPhase = i;
    await phases[i]();
    if (i < phases.length - 1) {
      await sleep(1500);
    }
  }
}

function togglePause() {
  demoPaused = !demoPaused;
  document.getElementById('btn-pause').textContent = demoPaused ? '▶ 继续' : '⏸ 暂停';
}

function skipPhase() {
  // Fast-forward: unpause and resolve all pending sleeps immediately
  demoPaused = false;
  // We do this by draining timers - just unpause and inject fast skip
  // The simplest approach: skip by setting a flag and resolving next sleep instantly
  // For now, unpause and continue
  demoPaused = false;
  document.getElementById('btn-pause').textContent = '⏸ 暂停';
}

function resetDemo() {
  demoRunning = false;
  demoPaused = false;
  currentPhase = 0;
  if (countdownTimer) clearInterval(countdownTimer);

  // reset progress
  setProgress(0);

  // hide banner
  document.getElementById('completion-banner').classList.remove('show');

  // clear chat
  document.getElementById('chat-messages').innerHTML = '';

  // reset right panel
  document.getElementById('skills-list').innerHTML = '';
  document.getElementById('panel-content-area').innerHTML = `
    <div class="panel-title">📋 当前方案</div>
    <div style="color:var(--text3);font-size:11px">演示开始后，方案会在此实时更新 ✨</div>
  `;

  // reset tabs
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.remove('active', 'flash-highlight');
    if (i === 0) t.classList.add('active');
  });

  // reset buttons
  const btn = document.getElementById('btn-start');
  btn.textContent = '▶ 开始演示';
  btn.className = 'ctrl-btn primary';
  btn.style.display = '';
  btn.onclick = startDemo;
  document.getElementById('btn-pause').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  document.getElementById('btn-pause').textContent = '⏸ 暂停';
}
</script>
