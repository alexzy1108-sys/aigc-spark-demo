<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>线索内容一体化 AIGC Claw</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #1c2128;
    --bg4: #21262d;
    --border: #30363d;
    --border2: #3d444d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --red: #FF2442;
    --red2: #ff4d65;
    --red-dim: rgba(255,36,66,0.12);
    --red-glow: rgba(255,36,66,0.25);
    --green: #3fb950;
    --blue: #58a6ff;
    --purple: #bc8cff;
    --yellow: #e3b341;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 48px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: -0.01em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--red), #ff6b84);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    box-shadow: 0 0 12px var(--red-glow);
  }
  .topbar-badge {
    font-size: 11px;
    padding: 2px 8px;
    background: var(--red-dim);
    color: var(--red2);
    border: 1px solid rgba(255,36,66,0.3);
    border-radius: 20px;
    font-weight: 500;
    margin-left: 4px;
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ctrl-btn {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .ctrl-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .ctrl-btn.primary {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 0 14px var(--red-glow);
  }
  .ctrl-btn.primary:hover { background: var(--red2); box-shadow: 0 0 20px var(--red-glow); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }

  /* ── LAYOUT ── */
  .app {
    display: flex;
    height: calc(100vh - 48px);
  }

  /* ── LEFT: CHAT ── */
  .chat-panel {
    width: 440px;
    min-width: 340px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg);
  }
  .chat-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .agent-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #1a2030, #2a3245);
    border: 1.5px solid var(--red);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 8px var(--red-glow);
    flex-shrink: 0;
  }
  .agent-info .name { font-weight: 600; font-size: 13px; }
  .agent-info .status {
    font-size: 11px; color: var(--green);
    display: flex; align-items: center; gap: 4px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100%{opacity:1} 50%{opacity:0.4}
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Bubble */
  .msg { display: flex; gap: 8px; max-width: 100%; }
  .msg.agent { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.agent .msg-avatar {
    background: linear-gradient(135deg, #1a2030, #2a3245);
    border: 1px solid rgba(255,36,66,0.4);
  }
  .msg.user .msg-avatar {
    background: linear-gradient(135deg, #1c2830, #243040);
    border: 1px solid var(--border2);
  }

  .bubble {
    max-width: 300px;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.65;
    position: relative;
  }
  .msg.agent .bubble {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #1e2d40, #162230);
    border: 1px solid rgba(88,166,255,0.2);
    border-top-right-radius: 4px;
    color: var(--text);
  }

  /* loading bubble */
  .loading-bubble {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    color: var(--text2);
    font-size: 12px;
    font-family: var(--mono);
  }
  .loading-dots {
    display: flex; gap: 3px;
  }
  .loading-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--red);
    animation: ldot 1.2s infinite;
  }
  .loading-dots span:nth-child(2){animation-delay:.2s}
  .loading-dots span:nth-child(3){animation-delay:.4s}
  @keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .cursor {
    display: inline-block;
    width: 2px; height: 13px;
    background: var(--red);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* tag inside bubble */
  .tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    margin-right: 4px;
  }
  .tag-red { background: var(--red-dim); color: var(--red2); border: 1px solid rgba(255,36,66,0.25); }
  .tag-blue { background: rgba(88,166,255,0.1); color: var(--blue); border: 1px solid rgba(88,166,255,0.25); }
  .tag-green { background: rgba(63,185,80,0.1); color: var(--green); border: 1px solid rgba(63,185,80,0.25); }
  .tag-purple { background: rgba(188,140,255,0.1); color: var(--purple); border: 1px solid rgba(188,140,255,0.25); }

  .bullet-line { padding-left: 2px; margin-bottom: 2px; color: var(--text); }
  .bullet-line .arr { color: var(--red); margin-right: 4px; }
  .diag-label { color: var(--text2); }

  /* ── RIGHT: BOARD ── */
  .board-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  .board-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .board-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }
  .board-icon {
    width: 20px; height: 20px;
    border-radius: 5px;
    background: var(--red-dim);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .stage-pills {
    display: flex;
    gap: 6px;
  }
  .stage-pill {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border2);
    color: var(--text3);
    background: var(--bg3);
    transition: all 0.3s;
  }
  .stage-pill.active {
    background: var(--red-dim);
    border-color: rgba(255,36,66,0.35);
    color: var(--red2);
  }
  .stage-pill.done {
    background: rgba(63,185,80,0.08);
    border-color: rgba(63,185,80,0.3);
    color: var(--green);
  }

  .board-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .board-content::-webkit-scrollbar { width: 4px; }
  .board-content::-webkit-scrollbar-track { background: transparent; }
  .board-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    gap: 12px;
    padding: 40px;
  }
  .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-text { font-size: 13px; text-align: center; line-height: 1.8; }

  /* Section card */
  .section-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.4s ease forwards;
  }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

  .section-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
  }
  .section-num {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--red-dim);
    border: 1px solid rgba(255,36,66,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--red2);
    font-family: var(--mono);
  }
  .section-title { font-weight: 600; font-size: 13px; }
  .section-sub { font-size: 11px; color: var(--text2); margin-left: auto; }

  .section-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

  /* Content card pair */
  .content-cards { display: flex; gap: 10px; }
  .content-card {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    position: relative;
    overflow: hidden;
  }
  .content-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .content-card.card-a::before { background: linear-gradient(90deg, var(--red), #ff6b84); }
  .content-card.card-b::before { background: linear-gradient(90deg, var(--purple), #d4a7ff); }

  .card-label {
    font-size: 10px;
    font-weight: 700;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-a .card-label { color: var(--red); }
  .card-b .card-label { color: var(--purple); }

  .card-title-text {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .card-meta { display: flex; flex-direction: column; gap: 4px; }
  .card-meta-row {
    display: flex;
    align-items: flex-start;
    gap: 5px;
    font-size: 11.5px;
    color: var(--text2);
    line-height: 1.5;
  }
  .meta-key {
    color: var(--text3);
    flex-shrink: 0;
    min-width: 42px;
    font-size: 11px;
  }

  /* Placement rows */
  .placement-grid { display: flex; flex-direction: column; gap: 10px; }
  .placement-row {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 13px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
    overflow: hidden;
  }
  .placement-row::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
  }
  .placement-row.row-a::after { background: var(--red); }
  .placement-row.row-b::after { background: var(--purple); }

  .pl-header { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; }
  .pl-tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    font-family: var(--mono);
    font-weight: 600;
  }
  .row-a .pl-tag { background: var(--red-dim); color: var(--red2); }
  .row-b .pl-tag { background: rgba(188,140,255,0.1); color: var(--purple); }

  .pl-items { display: flex; flex-direction: column; gap: 3px; }
  .pl-item {
    display: flex; align-items: flex-start; gap: 6px;
    font-size: 11.5px; color: var(--text2);
  }
  .pl-dot { color: var(--text3); flex-shrink: 0; margin-top: 1px; }

  /* Script cards */
  .script-cards { display: flex; flex-direction: column; gap: 10px; }
  .script-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 13px;
    position: relative;
    overflow: hidden;
  }
  .script-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .script-card.sc-a::before { background: var(--red); }
  .script-card.sc-b::before { background: var(--purple); }
  .script-from { font-size: 10.5px; color: var(--text3); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .script-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    position: relative;
  }
  .script-text::before {
    content: '"';
    position: absolute;
    top: -2px; left: 8px;
    font-size: 28px;
    color: var(--border2);
    font-family: Georgia, serif;
    line-height: 1;
  }
  .copy-btn {
    position: absolute;
    top: 8px; right: 8px;
    padding: 3px 8px;
    font-size: 10px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text3);
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* Complete banner */
  .complete-banner {
    background: linear-gradient(135deg, rgba(63,185,80,0.08), rgba(63,185,80,0.03));
    border: 1px solid rgba(63,185,80,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.1s forwards;
  }
  .complete-icon { font-size: 20px; }
  .complete-text { font-size: 12.5px; color: var(--green); }
  .complete-text strong { font-weight: 600; }
  .complete-text span { color: var(--text2); font-size: 11.5px; display: block; margin-top: 2px; }

  /* Progress bar at top of board */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red), #ff6b84);
    width: 0%;
    transition: width 0.6s ease;
    box-shadow: 0 0 8px var(--red-glow);
  }

  /* Separator line in bubble */
  .bubble-sep { border: none; border-top: 1px solid var(--border); margin: 8px 0; opacity: 0.5; }

  /* Diag highlight box */
  .diag-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 2px solid var(--red);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
  }

  /* Timestamp */
  .ts {
    font-size: 10px;
    color: var(--text3);
    text-align: center;
    font-family: var(--mono);
    margin: 4px 0;
  }

  .hidden { display: none !important; }
  .visible { display: flex !important; }

  /* Step indicator in board header */
  .step-info {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* CTA Button */
  .cta-banner {
    background: linear-gradient(135deg, rgba(255,36,66,0.08), rgba(255,36,66,0.03));
    border: 1px solid rgba(255,36,66,0.3);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.3s forwards;
    margin-top: 4px;
  }
  .cta-left { flex: 1; }
  .cta-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
  .cta-sub { font-size: 11.5px; color: var(--text2); }
  .cta-sub .cta-tag {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(63,185,80,0.1); color: var(--green);
    border: 1px solid rgba(63,185,80,0.25); border-radius: 4px;
    padding: 1px 6px; font-size: 11px; margin-right: 4px;
  }
  .cta-buttons { display: flex; gap: 8px; flex-shrink: 0; }
  .cta-btn-copy {
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    transition: all 0.2s;
    font-family: var(--sans);
    white-space: nowrap;
  }
  .cta-btn-copy:hover { border-color: var(--blue); color: var(--blue); }
  .cta-btn-use {
    padding: 7px 18px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: var(--red);
    color: #fff;
    transition: all 0.2s;
    font-family: var(--sans);
    box-shadow: 0 0 16px var(--red-glow);
    white-space: nowrap;
  }
  .cta-btn-use:hover { background: var(--red2); box-shadow: 0 0 24px var(--red-glow); transform: translateY(-1px); }

  /* Replay button */
  .replay-btn {
    display: none;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    transition: all 0.2s;
    font-family: var(--sans);
    margin-right: 8px;
  }
  .replay-btn:hover { border-color: var(--blue); color: var(--blue); }
  .replay-btn.show { display: flex; }

  /* Auto badge */
  .auto-badge {
    font-size: 10px;
    padding: 2px 7px;
    background: rgba(63,185,80,0.1);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.25);
    border-radius: 10px;
    font-family: var(--mono);
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-icon">🦞</div>
    线索内容一体化 AIGC Claw
    <span class="topbar-badge">Beta</span>
  </div>
  <div class="topbar-right">
    <span class="auto-badge" id="autoBadge">⚡ 自动播放</span>
    <button class="replay-btn" id="replayBtn" onclick="resetDemo()">↺ 重新演示</button>
    <button class="ctrl-btn" id="nextBtn" onclick="nextStep()" disabled>下一步 →</button>
    <button class="ctrl-btn primary" id="startBtn" onclick="startDemo()">▶ 开始演示</button>
  </div>
</div>

<div class="app">

  <!-- LEFT: CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="agent-avatar">🦞</div>
      <div class="agent-info">
        <div class="name">线索内容 Agent</div>
        <div class="status"><span class="status-dot"></span>在线 · 就绪</div>
      </div>
      <div style="margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--mono)">花束 Demo</div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyChat">

function typeText(el, text, speed=18, onDone){
  let i=0;
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);
  const iv = setInterval(()=>{
    if(i < text.length){
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;
      scrollChat();
    } else {
      clearInterval(iv);
      cursor.remove();
      if(onDone) onDone();
    }
  }, speed);
  return iv;
}

// ── FLOW CONTROL ──
const stepFns = [step0, step1, step2, step3, step4, step5];

function runStep(n, autoContinue){
  if(n >= STEPS) return;
  isRunning = true;
  $('nextBtn').disabled = true;

  stepFns[n](()=>{
    currentStep = n + 1;
    if(currentStep < STEPS){
      if(autoContinue){
        autoTimer = setTimeout(()=>{ runStep(currentStep, true); }, 1800);
      } else {
        isRunning = false;
        $('nextBtn').disabled = false;
      }
    }
  });
}

function startDemo(){
  $('startBtn').disabled = true;
  $('startBtn').textContent = '演示中...';
  $('autoBadge').style.display = 'inline-block';
  currentStep = 0;
  autoMode = true;
  runStep(0, true);
}

function nextStep(){
  if(isRunning) return;
  if(currentStep >= STEPS) return;
  clearTimeout(autoTimer);
  runStep(currentStep, false);
}

function resetDemo(){
  clearTimeout(autoTimer);
  isRunning = false;
  currentStep = 0;
  autoMode = false;

  // Reset chat

  const empty2 = document.createElement('div');
  empty2.id = 'emptyBoard';
  empty2.className = 'empty-state';
  empty2.innerHTML = '<div class="empty-icon">📋</div><div class="empty-text">方案看板将在对话推进时<br>实时同步更新</div>';
  board.appendChild(empty2);

  // Reset UI
  $('progressFill').style.width = '0%';
  $('stepInfo').textContent = '就绪';
  for(let i=1;i<=3;i++) $('pill'+i).className = 'stage-pill';
  $('startBtn').disabled = false;
  $('startBtn').textContent = '▶ 开始演示';
  $('nextBtn').disabled = true;
  $('replayBtn').classList.remove('show');
  $('autoBadge').style.display = 'none';
}

// ── COPY ──
function copyText(btn, text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = '已复制 ✓';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(()=>{
      btn.textContent = '复制';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}
